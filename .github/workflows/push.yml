name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - lockfile: Gemfile.activerecord-6.1.lock
            ruby-version: 3.2
          - lockfile: Gemfile.activerecord-7.0.lock
            ruby-version: 3.2
          - lockfile: Gemfile.activerecord-7.0.lock
            ruby-version: 3.3
          - lockfile: Gemfile.activerecord-7.1.lock
            ruby-version: 3.2
          - lockfile: Gemfile.activerecord-7.1.lock
            ruby-version: 3.3
          - lockfile: Gemfile.activerecord-7.1.lock
            ruby-version: 3.4
          - lockfile: Gemfile.activerecord-7.2.lock
            ruby-version: 3.2
          - lockfile: Gemfile.activerecord-7.2.lock
            ruby-version: 3.3
          - lockfile: Gemfile.activerecord-7.2.lock
            ruby-version: 3.4
          - lockfile: Gemfile.activerecord-8.0.lock
            ruby-version: 3.2
          - lockfile: Gemfile.activerecord-8.0.lock
            ruby-version: 3.3
          - lockfile: Gemfile.activerecord-8.0.lock
            ruby-version: 3.4
          - lockfile: Gemfile.activerecord-8.0.lock
            ruby-version: "4.0"
          - lockfile: Gemfile.lock
            ruby-version: 3.2
          - lockfile: Gemfile.lock
            ruby-version: 3.3
          - lockfile: Gemfile.lock
            ruby-version: 3.4
          - lockfile: Gemfile.lock
            ruby-version: "4.0"
    steps:
      - uses: actions/checkout@v3
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle check
        env:
          BUNDLE_LOCKFILE: ${{ matrix.lockfile }}
